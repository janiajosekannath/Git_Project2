name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Message
        run: echo "CI/CD Pipeline Executed Successfully"

      - name: Show Date
        run: date

      - name: List Files
        run: ls -la
